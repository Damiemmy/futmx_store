services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    entrypoint: ["./entrypoint.sh"]
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    environment:
      DJANGO_ENV: prod
      DATABASE_URL: postgres://bookstore:bookstore@db:5432/bookstore
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  celery_worker:
    build: ./backend
    command: celery -A futreg worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DJANGO_ENV: prod
      DATABASE_URL: postgres://bookstore:bookstore@db:5432/bookstore
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    command: celery -A futreg beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DJANGO_ENV: prod
      DATABASE_URL: postgres://bookstore:bookstore@db:5432/bookstore
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - media_data:/app/media:ro
      - static_data:/app/static:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
  static_data:

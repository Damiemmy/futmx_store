<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Verify your email</title>
</head>
<body style="font-family: Georgia, serif; background: #FAF7F2; padding: 40px;">
    <div style="max-width: 520px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 8px;">
        <h1 style="color: #1B2838;">Welcome to Bookstore</h1>
        <p>Hi {{ user.username }},</p>
        <p>Please verify your email address to complete your registration.</p>
        <a href="{{ link }}" style="display: inline-block; background: #C9A227; color: #1B2838; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold;">
            Verify Email
        </a>
        <p style="color: #666; font-size: 14px; margin-top: 24px;">
            If you did not create an account, you can safely ignore this email.
        </p>
    </div>
</body>
</html>

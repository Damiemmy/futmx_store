upstream django {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;

    client_max_body_size 50M;

    location / {
        proxy_pass http://frontend;
    }

    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        proxy_pass http://django;
    }

    location /media/ {
        alias /media/;
    }

    location /static/ {
        alias /static/;
    }
}